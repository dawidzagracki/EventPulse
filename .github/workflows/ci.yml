name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        working-directory: backend
        run: dotnet restore EventPulse.slnx

      - name: Build
        working-directory: backend
        run: dotnet build EventPulse.slnx -c Release --no-restore

      # Testcontainers uses the Docker engine preinstalled on GitHub-hosted runners.
      - name: Test (unit + architecture + integration)
        working-directory: backend
        run: dotnet test EventPulse.slnx -c Release --no-build --verbosity normal

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Typecheck & build
        working-directory: frontend
        run: npm run build
